  </g>
  <g fill="#4b4e6d">
    <rect x="28" y="70" width="58" height="9" rx="4.5"/>
    <rect x="28" y="88" width="38" height="9" rx="4.5"/>
  </g>
  <!-- slash conveying "hide" -->
  <line x1="22" y1="100" x2="100" y2="28" stroke="#ff6b6b" stroke-width="9" stroke-linecap="round"/>
</svg>
